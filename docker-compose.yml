services:
  # ----- Persistence -----
  postgres:
    container_name: ms-pg-sql
    image: postgres:18-alpine3.22
    environment:
      POSTGRES_USER: ${MS_PG_USER:-monty}
      POSTGRES_PASSWORD: ${MS_PG_PWD:-monty}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    networks:
      - microservices-net
    restart: unless-stopped

  mongo:
    container_name: ms-mongo-db
    image: mongo:8.0
    environment:
      MONGO_INITDB_DATABASE: customer
      MONGO_INITDB_ROOT_USERNAME: ${MS_MONGO_USER:-monty}
      MONGO_INITDB_ROOT_PASSWORD: ${MS_MONGO_PWD:-monty}
    volumes:
      - mongo_data:/data/db
    ports:
      - 27017:27017
    networks:
      - microservices-net
    restart: unless-stopped

  # ----- DB Management (Dev only) -----
  pgadmin:
    container_name: ms-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${MS_PGADMIN_DEFAULT_EMAIL:-pgadmin@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${MS_PGADMIN_DEFAULT_PWD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - 5050:80
    networks:
      - microservices-net

  mongo-express:
    container_name: ms-mongo-express
    image: mongo-express
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_ADMINUSERNAME=monty
      - ME_CONFIG_MONGODB_ADMINPASSWORD=monty
    ports:
      - 8082:8081
    networks:
      - microservices-net
    depends_on:
      - mongo

  # ----- Messaging (Kafka KRaft) -----
  broker:
    container_name: ms-kafka
    image: apache/kafka:3.9.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CLUSTER_ID: 'monty-ecommerce-platform'

      # Listeners
      KAFKA_LISTENERS: 'INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://broker:19092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@broker:9093'

      # Optimization
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - 9092:9092
    networks:
      - microservices-net

  # ----- Utility Services -----
  mail-dev:
    container_name: ms-mail-dev
    image: maildev/maildev
    ports:
      - 1080:1080
      - 1025:1025

# ===== Infrastructure Persistence Definitions =====
networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  kafka_data:
